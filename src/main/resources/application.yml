#      password: 123456
#      database: 0
#      lettuce:
#        pool:
#          max-active: 8
#          max-idle: 8
#          min-idle: 0
#          max-wait: 100ms

  # 3. ?????? (??????/??)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 4. MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ikun.blogsystem.entity
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名自动转换
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境下控制台打印 SQL 语句
  global-config:
    db-config:
      id-type: auto # 使用数据库自增 ID

# 5. 日志管理
logging:
  level:
    com.ikun.blogsystem: debug # 你的包名，开发环境设为 debug
    org.springframework.web: info
    org.springframework.security: debug # 开启安全模块调试日志

